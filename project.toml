[project]
name = "mvsmf"
version = "1.0.0-dev"
type = "module"

[build]
cflags = []

[mvs.build.datasets.source]
suffix = "SOURCE"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 20, 10, 20]

[mvs.build.datasets.punch]
suffix = "OBJECT"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 20, 10, 15]

[mvs.build.datasets.ncalib]
suffix = "NCALIB"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 19069
space = ["TRK", 10, 5, 15]

[mvs.build.datasets.syslmod]
suffix = "LOAD"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 15040
space = ["TRK", 20, 10, 20]

[mvs.install]
naming = "fixed"

[mvs.install.datasets.syslmod]
name = "'IBMUSER.HTTPD.V3R3M1D.LOAD'"

[dependencies]
"mvslovers/crent370" = ">=1.0.7"
"mvslovers/httpd" = "=4.0.0-dev"
"mvslovers/ufsd" = "=1.0.0-dev"

[link.module]
name = "MVSMF"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
include = [
	"@@CRT1",
	"CGXSTART",
	"MVSMF",
	"ROUTER",
	"AUTHMW",
	"LOGMW",
	"COMMON",
	"JSON",
	"DSAPI",
	"JOBSAPI",
	"INFOAPI",
	"USSAPI",
	"TESTAPI",
]

[link.module.dep_includes]
"mvslovers/ufsd" = "*"

[release]
version_files = ["VERSION"]

[artifacts]
loads = true
