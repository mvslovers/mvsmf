[project]
name = "mvsmf"
version = "1.0.0-dev"
type = "module"

[build]
cflags = []

[mvs.build.datasets.source]
suffix = "SOURCE"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 10, 5, 15]

[mvs.build.datasets.punch]
suffix = "OBJECT"
dsorg = "PO"
recfm = "FB"
lrecl = 80
blksize = 19040
space = ["TRK", 10, 5, 15]

[mvs.build.datasets.ncalib]
suffix = "NCALIB"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 19069
space = ["TRK", 10, 5, 15]

[mvs.build.datasets.syslmod]
suffix = "LOAD"
dsorg = "PO"
recfm = "U"
lrecl = 0
blksize = 15040
space = ["TRK", 5, 2, 5]

[dependencies]
"mvslovers/crent370" = ">=1.0.6"
"mvslovers/httpd" = "=3.3.1-dev"
"mvslovers/ufsd" = "=1.0.0-dev"

[link.module]
name = "MVSMF"
entry = "@@CRT0"
options = ["LIST", "MAP", "XREF", "RENT"]
include = [
	"@@CRT1",
	"CGXSTART",
	"MVSMF",
	"ROUTER",
	"AUTHMW",
	"LOGMW",
	"COMMON",
	"JSON",
	"XLATE",
	"DSAPI",
	"JOBSAPI",
	"INFOAPI",
	"TESTAPI",
]

[release]
version_files = ["VERSION"]

[artifacts]
loads = true
