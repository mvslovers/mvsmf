[project]
name = "mvsmf"
version = "1.0.0-dev"
type = "application"

[build]
# infoapi.c reports the project version via a VERSION string macro. v1's mbt
# injected -DVERSION automatically; v2 does not, so declare it explicitly.
# $(PROJECT_VERSION) is the make variable mbtconfig emits from [project].version.
cflags = ["-I", "include", '-DVERSION=\"$(PROJECT_VERSION)\"']

[dependencies]
"mvslovers/httpd" = "=4.0.0-dev"
"mvslovers/ufsd" = "=1.0.0-dev"

# Single load module: a CGI program that runs under httpd.  It includes its
# own request router + API handlers; the CGI launcher (cgistart, providing
# @@START) is no longer carried as a local cgxstart.c copy -- it is autocalled
# from httpd's client library (libhttpd.a), and the http_* API is reached at
# runtime through the httpx callback table (httpcgi.h).
[[module]]
name = "MVSMF"
startup = "crt1"
sources = ["src/*.c"]
exclude = ["src/cgxstart.c"]

# Unit test for the persistent name/value store (MVS-only: __getm/lock/STCK).
[[test]]
name = "TSTNTST"
sources = ["test/mvs/tstntst.c", "src/ntstore.c"]

[release]
version_files = ["VERSION"]
